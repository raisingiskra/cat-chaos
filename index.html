<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gentle Cat Chaos</title>
<style>
    body {
        font-family: 'Verdana', sans-serif;
        background: #fffbe6;
        color: #333;
        text-align: center;
        padding: 50px;
        overflow: hidden;
    }
    h1 {
        color: #ff4e50;
        cursor: pointer;
        transition: transform 0.3s;
    }
    h1:hover {
        transform: scale(1.2) rotate(10deg);
    }
    button {
        background: #ffcc00;
        border: none;
        padding: 12px 25px;
        font-size: 1em;
        cursor: pointer;
        margin: 10px;
        border-radius: 12px;
        transition: transform 0.2s;
    }
    button:hover {
        transform: scale(1.1);
    }
    #catResponse {
        margin-top: 30px;
        font-size: 1.3em;
        font-weight: bold;
    }
    .emoji, .movingCat {
        position: absolute;
        pointer-events: none;
        user-select: none;
        transition: all 2s ease; /* smooth, gentle movement */
    }
</style>
</head>
<body>
<h1>🐾 Gentle Cat Chaos! 🐾</h1>
<p>Click a button and see safe cat chaos!</p>

<button onclick="catSpeaks('food')">Give Cat Food</button>
<button onclick="catSpeaks('sock')">Give Cat Sock</button>
<button onclick="catSpeaks('moon')">Teleport to Moon</button>
<button onclick="catSpeaks('mona')">Show Mona Lisa</button>
<button onclick="catSpeaks('tuna')">Give Tuna</button>
<button onclick="catSpeaks('laser')">Laser Pointer Fun</button>

<div id="catResponse">Cat is watching… 😺</div>

<script>
const responses = {
    food: [
        "Cat: mmm yummy! 😻",
        "Cat: still hungry… bring more! 🐾"
    ],
    sock: [
        "Cat: socks? 🧦 They are fun!",
        "Cat: sock chaos begins… gently! 🐱"
    ],
    moon: [
        "Cat: hopping to the moon… 🌙",
        "Cat: moon walk complete! 😸"
    ],
    mona: [
        "Cat: hmm… art is weird… 🖼️",
        "Cat: better leave the painting alone 😼"
    ],
    tuna: [
        "Cat: TUNA LEVEL MAX! 🐟🐟🐟",
        "Cat: nom nom… delicious tuna 😺"
    ],
    laser: [
        "Cat: chasing the red dot… slowly… 🔴",
        "Cat: got it! 😼"
    ]
};

const emojis = {
    food: "🍗",
    sock: "🧦",
    moon: "🌙",
    mona: "🖼️",
    tuna: "🐟",
    laser: "🔴"
};

function randomPosition(max) {
    return Math.random() * max;
}

function spawnEmoji(type, count = 5) {
    for (let i = 0; i < count; i++) {
        const e = document.createElement('div');
        e.className = 'emoji';
        e.textContent = emojis[type] || "😸";
        e.style.left = randomPosition(window.innerWidth) + 'px';
        e.style.top = randomPosition(window.innerHeight) + 'px';
        e.style.fontSize = (20 + Math.random() * 40) + 'px';
        document.body.appendChild(e);

        // gentle movement
        setTimeout(() => {
            e.style.top = (parseFloat(e.style.top) - 50) + 'px';
            e.style.left = (parseFloat(e.style.left) + 50 - Math.random() * 100) + 'px';
        }, 100);

        setTimeout(() => e.remove(), 3000);
    }
}

function spawnMovingCat() {
    const cat = document.createElement('div');
    cat.className = 'movingCat';
    cat.textContent = "🐱";
    cat.style.fontSize = (30 + Math.random()*30) + "px";
    cat.style.left = -50 + "px";
    cat.style.top = randomPosition(window.innerHeight-100) + "px";
    document.body.appendChild(cat);

    // gentle horizontal movement
    let pos = -50;
    const speed = 1 + Math.random()*2;
    const interval = setInterval(() => {
        pos += speed;
        cat.style.left = pos + "px";
        if(pos > window.innerWidth + 50) {
            clearInterval(interval);
            cat.remove();
        }
    }, 20);
}

function catSpeaks(action) {
    // text response
    const chosen = responses[action][Math.floor(Math.random() * responses[action].length)];
    document.getElementById('catResponse').textContent = chosen;

    // spawn emojis gently
    spawnEmoji(action, 5);

    // spawn moving cats gently
    for(let i=0; i<2; i++) spawnMovingCat();
}
</script>
</body>
</html>
