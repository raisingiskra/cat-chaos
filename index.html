<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moderate Cat Chaos</title>
<style>
body {
    font-family: 'Verdana', sans-serif;
    background: linear-gradient(120deg, #fffbe6, #ffe6f2);
    color: #333;
    text-align: center;
    padding: 50px;
    overflow: hidden;
    transition: background 1s ease;
}

h1 {
    color: #ff4e50;
    font-size: 3em;
    cursor: pointer;
    transition: transform 0.3s, color 0.5s;
}
h1:hover {
    transform: scale(1.3) rotate(15deg);
    color: #ff8800;
}

button {
    background: #ffcc00;
    border: none;
    padding: 12px 25px;
    font-size: 1.1em;
    cursor: pointer;
    margin: 10px;
    border-radius: 12px;
    transition: transform 0.2s, background 0.3s, box-shadow 0.3s;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
}
button:hover {
    transform: scale(1.15) translateY(-3px);
    background: #ffdd33;
    box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
}

#catResponse {
    margin-top: 30px;
    font-size: 1.4em;
    font-weight: bold;
    color: #ff4e50;
    transition: color 0.5s;
}

.emoji, .movingCat {
    position: absolute;
    pointer-events: none;
    user-select: none;
    transition: all 1s ease;
}

.emoji {
    font-size: 2em;
}
</style>
</head>
<body>
<h1>🐾 Cat Chaos Moderate Edition 🐾</h1>
<p>Click buttons and watch Cat unleash mayhem!</p>

<button onclick="catSpeaks('food')">Food</button>
<button onclick="catSpeaks('sock')">Sock</button>
<button onclick="catSpeaks('moon')">Moon</button>
<button onclick="catSpeaks('mona')">Mona Lisa</button>
<button onclick="catSpeaks('tuna')">Tuna</button>
<button onclick="catSpeaks('laser')">Laser</button>
<button onclick="catSpeaks('dance')">Dance</button>

<div id="catResponse">Cat is scheming… 😼</div>

<script>
const responses = {
    food: ["YUM! 😻", "Nom nom nom!", "I want more food!!!"],
    sock: ["Sock chaos! 🧦", "SO MANY SOCKS!", "Sock party begins!"],
    moon: ["Moon mission! 🌙", "Floating fluff!", "Cheese, here I come!"],
    mona: ["Art chaos! 🖼️", "Taste the painting!", "Hmm… interesting!"],
    tuna: ["TUNA FRENZY! 🐟🐟", "Nom nom nom!", "Fish everywhere!"],
    laser: ["Chasing red dot! 🔴", "Almost got it!", "Zoom zoom zoom!"],
    dance: ["Dance mode! 💃", "Shake it kitty!", "Boogie boogie!"]
};

const emojis = {
    food:"🍗", sock:"🧦", moon:"🌙", mona:"🖼️", tuna:"🐟", laser:"🔴", dance:"💃"
};

function randomPos(max){return Math.random()*max;}

function spawnEmoji(type,count=6){
    for(let i=0;i<count;i++){
        const e=document.createElement('div');
        e.className='emoji';
        e.textContent=emojis[type]||"😸";
        e.style.left=randomPos(window.innerWidth)+'px';
        e.style.top=randomPos(window.innerHeight)+'px';
        e.style.fontSize=(20+Math.random()*40)+'px';
        document.body.appendChild(e);

        // Random movement
        setTimeout(()=>{
            e.style.top=(parseFloat(e.style.top)+Math.random()*200-100)+'px';
            e.style.left=(parseFloat(e.style.left)+Math.random()*200-100)+'px';
        },50);

        setTimeout(()=>e.remove(),4000);
    }
}

function spawnMovingCat(){
    const cat=document.createElement('div');
    cat.className='movingCat';
    cat.textContent="🐱";
    cat.style.fontSize=(30+Math.random()*50)+'px';
    cat.style.left=-50+'px';
    cat.style.top=randomPos(window.innerHeight-120)+'px';
    document.body.appendChild(cat);

    let pos=-50;
    const speed=2+Math.random()*3;
    const interval=setInterval(()=>{
        pos+=speed;
        cat.style.left=pos+'px';
        if(pos>window.innerWidth+50){
            clearInterval(interval);
            cat.remove();
        }
    },16);
}

function catSpeaks(action){
    const msg=responses[action][Math.floor(Math.random()*responses[action].length)];
    const catDiv=document.getElementById('catResponse');
    catDiv.textContent=msg;

    spawnEmoji(action,8);

    for(let i=0;i<4;i++) spawnMovingCat();

    // Slight background shift for extra energy
    document.body.style.background=`linear-gradient(120deg,#fffbe6,#ffe6f2,#${Math.floor(Math.random()*16777215).toString(16)})`;
}
</script>
</body>
</html>
